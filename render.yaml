services:
  - type: web
    name: research-app
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: "/health"
    envVars:
      - key: APP_ENV
        value: production
      - key: SESSION_COOKIE_NAME
        value: research_session
      - key: APP_NAME
        value: Research Feed App
      - key: DATABASE_URL
        sync: false
      - key: SYNC_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
