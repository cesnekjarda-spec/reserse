{% extends "base.html" %}
{% block title %}Registrace{% endblock %}
{% block content %}
<section class="card auth-card">
  <h1>Registrace</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" class="stack">
    <label>Uživatelské jméno<input type="text" name="username" required></label>
    <label>E-mail<input type="email" name="email" required></label>
    <label>Heslo<input type="password" name="password" required></label>
    <label>Potvrzení hesla<input type="password" name="password_confirm" required></label>
    <button class="btn" type="submit">Vytvořit účet</button>
  </form>
</section>
{% endblock %}
