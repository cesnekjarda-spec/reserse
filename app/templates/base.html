<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Research Feed App{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="/">Research Feed App</a>
      <nav>
        {% if current_user %}
          {% if current_user.role == 'admin' %}<a href="/admin">Admin</a>{% endif %}
          <a href="/dashboard">Dashboard</a>
          <a href="/logout">Odhlásit</a>
        {% else %}
          <a href="/login">Přihlášení</a>
          <a href="/register">Registrace</a>
        {% endif %}
      </nav>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
