{% extends "base.html" %}
{% block title %}Reserse · Přihlášení{% endblock %}
{% block content %}
<section class="auth-shell">
  <article class="card auth-card auth-card-large">
    <div class="eyebrow">Přístup do aplikace</div>
    <h1>Přihlášení</h1>
    <p>Použij uživatelské jméno nebo e-mail.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" class="stack">
      <label>Jméno nebo e-mail<input type="text" name="identity" required></label>
      <label>Heslo<input type="password" name="password" required></label>
      <button class="btn" type="submit">Přihlásit</button>
    </form>
    <div class="credentials credentials-box">
      <div><strong>Admin:</strong> Admin / Ahojky12345</div>
      <div><strong>User:</strong> User / Ahojky54321</div>
    </div>
  </article>
</section>
{% endblock %}
