name: Sync RSS

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -X POST "${{ secrets.SYNC_URL }}"             -H "X-Sync-Secret: ${{ secrets.SYNC_SECRET }}"             -H "Content-Type: application/json"
