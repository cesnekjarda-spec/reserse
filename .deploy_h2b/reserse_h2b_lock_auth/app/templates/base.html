<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Reserse{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap nav-shell">
      <div>
        <a class="brand" href="/">Reserse</a>
        <div class="brand-subtitle">Monitorování témat, briefingy a admin review workflow</div>
      </div>
      <nav class="site-nav">
        <a href="/">Úvod</a>
        {% if current_user %}
          {% if current_user.role == 'admin' %}<a href="/admin">Admin</a><a href="/admin/users">Uživatelé</a>{% endif %}
          <a href="/dashboard">Dashboard</a>
          <a href="/logout">Odhlásit</a>
        {% else %}
          <a href="/login">Přihlášení</a>
        {% endif %}
      </nav>
    </div>
  </header>
  <main class="wrap page-shell">
    {% block content %}{% endblock %}
  </main>

<script>
(function () {
  let activeButton = null;
  function stopReading() {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    if (activeButton) {
      activeButton.textContent = "Přečíst briefing nahlas";
      activeButton.dataset.reading = "0";
    }
    activeButton = null;
  }
  function pickVoice() {
    const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    return voices.find(v => (v.lang || "").toLowerCase().startsWith("cs")) || voices.find(v => (v.lang || "").toLowerCase().startsWith("sk")) || voices[0] || null;
  }
  document.addEventListener("click", function (event) {
    const button = event.target.closest(".js-read-aloud");
    if (!button) return;
    if (!window.speechSynthesis) {
      alert("Tento prohlížeč nepodporuje čtení nahlas.");
      return;
    }
    const text = (button.dataset.speechText || "").trim();
    if (!text) return;
    if (button.dataset.reading === "1") {
      stopReading();
      return;
    }
    stopReading();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "cs-CZ";
    utterance.rate = 1;
    utterance.pitch = 1;
    const voice = pickVoice();
    if (voice) utterance.voice = voice;
    utterance.onend = stopReading;
    utterance.onerror = stopReading;
    activeButton = button;
    button.dataset.reading = "1";
    button.textContent = "Zastavit čtení";
    window.speechSynthesis.speak(utterance);
  });
  window.addEventListener("beforeunload", stopReading);
})();
</script>
</body>
</html>
